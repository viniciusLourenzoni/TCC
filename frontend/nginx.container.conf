server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker e manifest nunca devem ser cacheados agressivamente
    location ~* (sw\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
    }

    # Assets com hash podem ser cacheados por muito tempo
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
