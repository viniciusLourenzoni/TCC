services:
  postgres:
    image: postgres:15-alpine
    container_name: pwa_varejo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pwa_varejo
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pwa_varejo_network

volumes:
  postgres_data:
    driver: local

networks:
  pwa_varejo_network:
    driver: bridge
